name: Publicar conversor no GitHub Pages

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Compilar o projeto
    runs-on: ubuntu-latest

    steps:
      - name: Baixar os arquivos do repositorio
        uses: actions/checkout@v4

      - name: Preparar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar as dependencias
        run: npm install

      - name: Compilar o site
        run: npm run build

      - name: Configurar o GitHub Pages
        uses: actions/configure-pages@v5

      - name: Enviar a pasta compilada
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    name: Publicar no GitHub Pages
    needs: build

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Publicar o site
        id: deployment
        uses: actions/deploy-pages@v4
